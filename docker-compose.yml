services:
  postgres:
    image: postgres:16-alpine
    container_name: mines-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    container_name: mines-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    container_name: mines-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: mines-frontend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: mines-caddy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
